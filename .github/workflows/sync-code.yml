# Sync flow (each run): clone latest homeassistant/core Verisure component,
# regenerate homeassistant path layout from tracked patches/, git apply all
# patches, copy into custom_components/verisure, then bump HACS/manifest version
# and scan interval. Upstream owns unpatched lines; commits custom_components/ and
# upstream_snapshot/ (unpatched baseline for change detection).
name: "Sync Verisure Component Code"
on:
  workflow_dispatch:
  schedule:
    # Run every hour on weekdays
    - cron: "0 * * * 1-5"

jobs:
  sync-verisure-component-code:
    name: Sync Verisure Component Code
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository

      - name: Update Verisure Component Code
        run: |
          ./scripts/update.sh

      - name: Commit new changes
        id: commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add custom_components/verisure upstream_snapshot
          if ! git diff --staged --quiet; then
            git commit -nm "Update Verisure component code"
            git push origin main
            echo "changes_made=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to the verisure component code on this run."
            echo "changes_made=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure version tag
        run: |
          git tag -f "${{ env.HOMEASSISTANT_VERSION }}"
          git push -f origin "refs/tags/${{ env.HOMEASSISTANT_VERSION }}"

      - name: Create Github Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ env.HOMEASSISTANT_VERSION }}"
          if gh release view "$VERSION" &>/dev/null; then
            if [ "${{ steps.commit.outputs.changes_made }}" = "true" ]; then
              gh release delete "$VERSION" --yes
            else
              echo "Release $VERSION already exists; skipping."
              exit 0
            fi
          fi
          gh release create "$VERSION" --latest --generate-notes --title "$VERSION"
